<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Health AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Symptom Analysis and Treatment Recommendation System (Mistral + RAG)</h2>

<div id="chatbox"></div>

<br>

<div class="input-row">
    <input id="inputBox" type="text" placeholder="Ask a health question">
    <button id="btn">Send</button>
</div>

<script>
const inputBox = document.getElementById("inputBox");
const btn = document.getElementById("btn");
const chat = document.getElementById("chatbox");

let msgIdCounter = 0;

function appendMessage(type, text) {
    const id = `msg-${msgIdCounter++}`;
    const div = document.createElement("div");
    div.id = id;
    div.className = type;
    const label = type === "user" ? "You:" : "AI:";
    div.innerHTML = `<b>${label}</b> <span></span>`;
    div.querySelector("span").textContent = " " + text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return id;
}

function updateMessage(id, speaker, text) {
    const div = document.getElementById(id);
    if (!div) return;
    div.innerHTML = `<b>${speaker}:</b> <span></span>`;
    div.querySelector("span").textContent = " " + text;
}

window.addEventListener("DOMContentLoaded", function () {
    appendMessage(
        "bot",
        "Hello, dear user! I’m here to support you with health-related questions, though I cannot replace professional medical care." 
    );
});

btn.onclick = sendMessage;

inputBox.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

async function sendMessage() {
    const q = inputBox.value.trim();
    if (!q) return;
    inputBox.value = "";

    appendMessage("user", q);

    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Sending...";

    try {
        const loadingId = appendMessage("bot", "Thinking...");

        const response = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q })
        });

        if (!response.ok) {
            throw new Error("Server error");
        }

        const data = await response.json();

        updateMessage(loadingId, "AI", data.answer || "No answer returned.");
    } catch (err) {
        console.error(err);
        appendMessage("bot", "Oops, something went wrong. Please try again.");
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
        chat.scrollTop = chat.scrollHeight;
    }
}
</script>

</body>
</html>
